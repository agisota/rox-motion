name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Typecheck
        run: bun run typecheck
      - name: Unit + a11y tests
        run: bun run test

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true # enable once eslint deps are added
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint

  visual:
    runs-on: ubuntu-latest
    continue-on-error: true # enable once a preview server + Playwright are wired
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx playwright install --with-deps chromium
      - run: bun run build:preview &
      - run: bun run test:visual
